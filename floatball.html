<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:100px; height:100px; overflow:hidden; background:transparent; user-select:none; }
  .ball {
    width:44px; height:44px; border-radius:50%;
    margin:28px; position:relative; opacity:1;
    background:linear-gradient(135deg,#4d6bfe,#6c8cff);
    box-shadow:0 2px 12px rgba(77,107,254,0.45);
    display:flex; align-items:center; justify-content:center;
    transition:transform 0.15s cubic-bezier(0.2,0,0,1), box-shadow 0.3s, opacity 0.2s;
    cursor:pointer;
  }
  .ball.fade-out { opacity:0 !important; pointer-events:none; }
  .ball:hover { transform:scale(1.08); box-shadow:0 4px 20px rgba(77,107,254,0.55), 0 0 24px 4px rgba(108,140,255,0.25); }
  .glow {
    position:absolute; top:0; left:0; width:100%; height:100%; border-radius:50%;
    pointer-events:none; opacity:0;
    background:radial-gradient(circle at 50% 50%, rgba(255,255,255,0.25) 0%, transparent 60%);
    transition:opacity 0.25s;
  }
  .ball:hover .glow { opacity:1; }
  svg { position:relative; z-index:1; pointer-events:none; }
  .tip {
    position:absolute; top:2px; left:50%; transform:translateX(-50%);
    background:rgba(0,0,0,0.78); color:#fff;
    font-size:11px; padding:5px 10px; border-radius:5px;
    white-space:nowrap; font-family:system-ui,sans-serif;
    pointer-events:none; opacity:0;
    transition:opacity 0.35s; letter-spacing:0.3px;
  }
  .tip.show { opacity:1; }
</style></head>
<body>
<div class="tip" id="tip">双击可关闭悬浮球</div>
<div class="ball" id="ball">
  <div class="glow" id="glow"></div>
  <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round">
    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
  </svg>
</div>
<script>
(function() {
  var ball = document.getElementById('ball');
  var glow = document.getElementById('glow');
  var tip = document.getElementById('tip');
  var startX, startY, lastX, lastY, moved = false, pointerId = null;

  if (!localStorage.getItem('fb-tip-shown')) {
    tip.classList.add('show');
    localStorage.setItem('fb-tip-shown', '1');
    setTimeout(function() { tip.classList.remove('show'); }, 3500);
  }

  ball.addEventListener('dblclick', function(e) {
    e.preventDefault();
    window.float.closeFloat();
  });

  ball.addEventListener('contextmenu', function(e) {
    e.preventDefault();
    window.float.showContextMenu();
  });

  ball.addEventListener('pointerdown', function(e) {
    startX = e.screenX; startY = e.screenY;
    lastX = e.screenX; lastY = e.screenY;
    moved = false;
    pointerId = e.pointerId;
    ball.setPointerCapture(e.pointerId);
    ball.style.transform = 'scale(0.92)';
    ball.style.transition = 'transform 0.08s';
  });

  ball.addEventListener('pointermove', function(e) {
    var rect = ball.getBoundingClientRect();
    var cx = ((e.clientX - rect.left) / rect.width) * 100;
    var cy = ((e.clientY - rect.top) / rect.height) * 100;
    glow.style.background = 'radial-gradient(circle at ' + cx + '% ' + cy + '%, rgba(255,255,255,0.3) 0%, transparent 60%)';

    if (pointerId === null) return;
    var dx = e.screenX - lastX;
    var dy = e.screenY - lastY;
    lastX = e.screenX; lastY = e.screenY;
    var dist = Math.abs(e.screenX - startX) + Math.abs(e.screenY - startY);
    if (!moved && dist > 3) moved = true;
    if (moved && isFinite(dx) && isFinite(dy)) window.float.onDrag(dx, dy);
  });

  ball.addEventListener('pointerleave', function() {
    glow.style.background = 'radial-gradient(circle at 50% 50%, rgba(255,255,255,0.25) 0%, transparent 60%)';
  });

  ball.addEventListener('pointerup', function(e) {
    ball.releasePointerCapture(pointerId);
    pointerId = null;
    ball.style.transform = '';
    ball.style.transition = 'transform 0.25s cubic-bezier(0.2,0,0,1), box-shadow 0.3s, opacity 0.2s';
    if (!moved) {
      setTimeout(function() { ball.classList.add('fade-out'); }, 200);
      setTimeout(function() { window.float.onClick(); }, 430);
    }
  });

  ball.addEventListener('pointercancel', function() {
    ball.releasePointerCapture(pointerId);
    pointerId = null;
  });
})();
</script>
</body>
</html>

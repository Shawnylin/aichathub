<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' 'unsafe-eval'; img-src 'self' https: data:; font-src 'self'; connect-src 'self';">
<title>AI Chat Hub</title>
<style>
  @font-face {
    font-family: 'AliHealth';
    src: url('fonts/阿里健康体-v2.0/阿里健康体 2.0 中文/AlibabaHealthFont2.0CN-45R.ttf') format('truetype');
    font-weight: 400;
  }
  @font-face {
    font-family: 'AliHealth';
    src: url('fonts/阿里健康体-v2.0/阿里健康体 2.0 中文/AlibabaHealthFont2.0CN-85B.ttf') format('truetype');
    font-weight: 700;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  :root { --sidebar-w: 260px; --collapsed-w: 56px; }

  body {
    font-family: system-ui, -apple-system, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    height: 100vh;
    display: flex; flex-direction: column;
    overflow: hidden;
    user-select: none; -webkit-user-select: none;
    /* light defaults */
    --bg-titlebar:    #f5f5f5;
    --bg-sidebar:     #f5f5f5;
    --bg-content:     #fff;
    --bg-navbar:      #fff;
    --bg-urlbar:      #f9f9f9;
    --bg-webview:     #fff;
    --border-sidebar: #e0e0e0;
    --border-nav:     #e5e5e5;
    --border-btn:     #d5d5d5;
    --text-title:     #999;
    --text-tab:       #555;
    --text-tab-active:#222;
    --text-dim:       #999;
    --text-url:       #888;
    --text-url-domain:#333;
    --hover-tab:      #e8e8e8;
    --hover-navbtn:   #f0f0f0;
    --active-tab-bg:  #e0e0e0;
    --win-hover:      #e0e0e0;
    --btn-hover:      #e0e0e0;
    --footer-text:    #aaa;
    --section-label:  #aaa;
  }

  #titlebar {
    height:40px; background:var(--bg-titlebar);
    display:flex; align-items:center; padding:0 8px;
    z-index:100; -webkit-app-region:drag; flex-shrink:0;
    transition: background 0.3s;
  }
  #titlebar .title { flex:1; text-align:center; font-size:12px; font-weight:500; color:var(--text-title); }
  .win-btn {
    -webkit-app-region:no-drag;
    width:36px; height:28px; border:none; border-radius:6px;
    background:transparent; color:var(--text-dim);
    cursor:pointer; display:flex; align-items:center; justify-content:center;
    font-size:14px; transition: background 0.12s, color 0.12s;
  }
  .win-btn:hover { background:var(--win-hover); color:#333; }
  #btn-close:hover { background:#e02f2f; color:#fff; }

  #app { display:flex; flex:1; overflow:hidden; }

  /* ========== SIDEBAR ========== */
  #sidebar {
    width:var(--sidebar-w); background:var(--bg-sidebar);
    display:flex; flex-direction:column; flex-shrink:0;
    border-right:1px solid var(--border-sidebar);
    transition: width 0.25s cubic-bezier(0.4, 0, 0.2, 1), background 0.3s, border-color 0.3s;
    overflow:hidden;
  }
  #sidebar.collapsed { width:var(--collapsed-w); }

  .sidebar-header {
    display:flex; align-items:center; justify-content:space-between;
    padding:14px 14px 12px;
    border-bottom:1px solid var(--border-sidebar);
    transition: padding 0.25s, border-color 0.3s;
  }
  #sidebar.collapsed .sidebar-header { padding:14px 8px 12px; justify-content:center; }
  .sidebar-header .logo-area { display:flex; align-items:center; gap:10px; white-space:nowrap; }
  #sidebar.collapsed .sidebar-header .logo-area { display:none; }
  .sidebar-header .logo-icon {
    width:28px; height:28px; flex-shrink:0;
    background:linear-gradient(135deg, #4d6bfe, #6c8cff);
    border-radius:7px;
    display:flex; align-items:center; justify-content:center;
    font-size:15px;
  }
  .sidebar-header .logo-text { font-size:14px; font-weight:600; color:var(--text-tab-active); }
  .collapse-btn {
    width:30px; height:30px; border:none; border-radius:6px;
    background:transparent; color:var(--text-dim);
    cursor:pointer; font-size:16px; flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
    transition: background 0.12s, color 0.12s;
  }
  .collapse-btn:hover { background:var(--btn-hover); color:var(--text-tab-active); }

  .sidebar-nav {
    flex:1; padding:8px 10px;
    display:flex; flex-direction:column; gap:2px;
    overflow-y:auto; overflow-x:hidden;
  }
  #sidebar.collapsed .sidebar-nav { padding:8px 6px; }
  .sidebar-nav .section-label {
    font-size:10px; font-weight:600; color:var(--section-label);
    text-transform:uppercase; letter-spacing:0.8px;
    padding:12px 10px 6px; white-space:nowrap;
    transition: opacity 0.15s, padding 0.25s, color 0.3s;
  }
  #sidebar.collapsed .sidebar-nav .section-label { opacity:0; padding:12px 0 6px; text-align:center; font-size:0; }

  .tab-item {
    display:flex; align-items:center; gap:12px;
    padding:9px 12px; border-radius:8px;
    cursor:pointer;
    color:var(--text-tab); font-size:13px; font-weight:450;
    border:none; background:none;
    width:100%; text-align:left; font-family:inherit;
    white-space:nowrap; overflow:hidden;
    transition: background 0.12s, padding 0.25s, gap 0.25s, color 0.12s;
  }
  .tab-item:hover { background:var(--hover-tab); color:var(--text-tab-active); }
  .tab-item.active { color:#111; font-weight:500; background:var(--active-tab-bg); }
  #sidebar.collapsed .tab-item { padding:9px 0; justify-content:center; gap:0; position:relative; }
  .tab-item .favicon,
  .tab-item .favicon-placeholder { width:22px; height:22px; border-radius:5px; object-fit:contain; flex-shrink:0; }
  .tab-item .favicon-placeholder {
    display:flex; align-items:center; justify-content:center;
    font-size:11px; font-weight:700; color:#fff;
  }
  .tab-item .tab-text { flex:1; overflow:hidden; transition: opacity 0.15s, width 0.25s; }
  #sidebar.collapsed .tab-item .tab-text { opacity:0; width:0; flex:0; }
  .tab-item .indicator { width:6px; height:6px; border-radius:50%; flex-shrink:0; opacity:0; transition: opacity 0.15s; }
  .tab-item.active .indicator { opacity:1; }
  #sidebar.collapsed .tab-item .indicator { position:absolute; right:4px; width:5px; height:5px; }

  .sidebar-footer {
    padding:10px 14px;
    border-top:1px solid var(--border-sidebar);
    display:flex; align-items:center; gap:10px;
    transition: padding 0.25s, border-color 0.3s;
    overflow:hidden;
    min-height:52px;
  }
  #sidebar.collapsed .sidebar-footer { padding:10px 8px; justify-content:center; gap:0; }
  .theme-btn {
    width:34px; height:34px; border-radius:7px; border:none;
    background:transparent; cursor:pointer; flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
    transition: background 0.12s;
  }
  .theme-btn svg { width:18px; height:18px; }
  .theme-btn .icon-sun { fill:var(--text-dim); stroke:var(--text-dim); stroke-width:1.5; }
  .theme-btn .icon-moon { fill:var(--text-dim); }
  .theme-btn:hover { background:var(--btn-hover); }
  .footer-info { font-size:11px; color:var(--footer-text); white-space:nowrap; transition: opacity 0.15s, color 0.3s; }
  #sidebar.collapsed .footer-info { display:none; }

  /* ========== CONTENT ========== */
  #content { flex:1; display:flex; flex-direction:column; overflow:hidden; background:var(--bg-content); transition: background 0.3s; }
  #navbar {
    height:42px; background:var(--bg-navbar);
    border-bottom:1px solid var(--border-nav);
    display:flex; align-items:center; padding:0 12px; gap:6px; flex-shrink:0;
    transition: background 0.3s, border-color 0.3s;
  }
  .nav-btn {
    width:36px; height:32px;
    border:1.5px solid var(--border-btn); border-radius:8px;
    background:transparent; color:var(--text-tab);
    cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    transition: all 0.15s;
    flex-shrink:0;
  }
  .nav-btn svg { width:18px; height:18px; fill:var(--text-tab); transition: fill 0.15s; }
  .nav-btn:hover { background:var(--hover-navbtn); border-color:#bbb; }
  .nav-btn:hover svg { fill:#333; }
  body.dark .nav-btn:hover svg { fill:#ddd; }
  .nav-btn:active { transform:scale(0.95); }
  .nav-btn.disabled { opacity:0.3; pointer-events:none; }
  #url-bar {
    flex:1; height:30px; border:1px solid var(--border-btn); border-radius:6px;
    background:var(--bg-urlbar); padding:0 12px;
    font-size:12px; color:var(--text-url);
    display:flex; align-items:center;
    overflow:hidden; white-space:nowrap; text-overflow:ellipsis;
    transition: background 0.3s, border-color 0.3s, color 0.3s;
  }
  #url-bar .url-domain { color:var(--text-url-domain); font-weight:500; }

  .site-tag {
    padding:4px 10px; border-radius:5px; font-size:11px; font-weight:600;
    white-space:nowrap; flex-shrink:0;
    transition: background 0.3s, color 0.3s;
  }
  .site-tag.ds  { background:#eef1ff; color:#4d6bfe; }
  .site-tag.yb  { background:#e6f9f5; color:#00b894; }
  .site-tag.mm  { background:#f0f9ff; color:#0ea5e9; }
  .site-tag.db  { background:#eef2ff; color:#6366f1; }
  .site-tag.km  { background:#f0f0f0; color:#1a1a1a; }

  #webview-container { flex:1; position:relative; background:var(--bg-webview); transition: background 0.3s; }
  webview { width:100%; height:100%; display:none; position:absolute; top:0; left:0; }
  webview.visible { display:flex; }

  /* ========== DARK MODE ========== */
  body.dark {
    --bg-titlebar:    #171717;
    --bg-sidebar:     #171717;
    --bg-content:     #212121;
    --bg-navbar:      #212121;
    --bg-urlbar:      #1a1a1a;
    --bg-webview:     #212121;
    --border-sidebar: #262626;
    --border-nav:     #333;
    --border-btn:     #333;
    --text-title:     #6e6e6e;
    --text-tab:       #a0a0a0;
    --text-tab-active:#f0f0f0;
    --text-dim:       #8e8e8e;
    --text-url:       #666;
    --text-url-domain:#ddd;
    --hover-tab:      #1f1f1f;
    --hover-navbtn:   #2a2a2a;
    --active-tab-bg:  #252525;
    --win-hover:      #2a2a2a;
    --btn-hover:      #252525;
    --footer-text:    #555;
    --section-label:  #5a5a5a;
  }
  body.dark .tab-item.active { color:#f0f0f0; }
  body.dark .nav-btn:hover { color:#ddd; }
  body.dark .site-tag.ds  { background:#1a1d2e; color:#6c8cff; }
  body.dark .site-tag.yb  { background:#1a2e28; color:#2dd4a8; }
  body.dark .site-tag.mm  { background:#1a2a33; color:#38bdf8; }
  body.dark .site-tag.db  { background:#1e1f2e; color:#818cf8; }
  body.dark .site-tag.km  { background:#2a2a2a; color:#999; }

  /* ========== ABOUT MODAL ========== */
  #about-overlay {
    position:fixed; top:0; left:0; width:100%; height:100%;
    background:rgba(0,0,0,0.5); z-index:200;
    display:flex; align-items:center; justify-content:center;
    opacity:0; pointer-events:none;
    transition: opacity 0.2s;
  }
  #about-overlay.show { opacity:1; pointer-events:auto; }
  #about-dialog {
    background:var(--bg-content); border-radius:12px;
    padding:28px 32px; width:380px; max-width:90vw;
    box-shadow:0 8px 32px rgba(0,0,0,0.3);
    transition: background 0.3s;
  }
  #about-dialog h2 { font-size:18px; font-weight:600; color:var(--text-tab-active); margin-bottom:16px; }
  #about-dialog .about-row {
    display:flex; justify-content:space-between; align-items:center;
    padding:8px 0; font-size:13px; color:var(--text-tab);
    border-bottom:1px solid var(--border-nav);
  }
  #about-dialog .about-row:last-child { border-bottom:none; }
  #about-dialog .about-label { font-weight:500; color:var(--text-dim); }
  #about-dialog .about-value { color:var(--text-tab-active); font-weight:500; user-select:all; }
  #about-dialog .about-value a { color:#4d6bfe; text-decoration:none; }
  #about-dialog .about-value a:hover { text-decoration:underline; }
  #about-dialog .about-close {
    margin-top:18px; width:100%; padding:8px; border-radius:7px; border:1px solid var(--border-btn);
    background:transparent; color:var(--text-tab); cursor:pointer; font-size:13px;
    transition: background 0.12s;
  }
  #about-dialog .about-close:hover { background:var(--hover-navbtn); }
</style>
</head>
<body>

<div id="titlebar">
  <span class="title">AI Chat Hub</span>
  <button class="win-btn" id="btn-min">&ndash;</button>
  <button class="win-btn" id="btn-max">&#x25A1;</button>
  <button class="win-btn" id="btn-close">&#x2715;</button>
</div>

<div id="app">
  <div id="sidebar">
    <div class="sidebar-header">
      <div class="logo-area">
        <span class="logo-icon">&#9670;</span>
        <span class="logo-text">AI Chat Hub</span>
      </div>
      <button class="collapse-btn" id="collapse-btn" title="收起侧栏">&#x2630;</button>
    </div>

    <div class="sidebar-nav">
      <div class="section-label">会话</div>

      <button class="tab-item active" data-site="deepseek" title="DeepSeek">
        <img src="https://chat.deepseek.com/favicon.ico" class="favicon" alt=""
             onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
        <span class="favicon-placeholder" style="display:none;background:#4d6bfe">DS</span>
        <span class="tab-text">DeepSeek</span>
        <span class="indicator" style="background:#4d6bfe"></span>
      </button>

      <button class="tab-item" data-site="yuanbao" title="腾讯元宝">
        <img src="https://yuanbao.tencent.com/chat/favicon.ico" class="favicon" alt=""
             onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
        <span class="favicon-placeholder" style="display:none;background:#00b894">YB</span>
        <span class="tab-text">腾讯元宝</span>
        <span class="indicator" style="background:#00b894"></span>
      </button>

      <button class="tab-item" data-site="doubao" title="豆包">
        <img src="https://www.doubao.com/chat/favicon.ico" class="favicon" alt=""
             onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
        <span class="favicon-placeholder" style="display:none;background:#6366f1">DB</span>
        <span class="tab-text">豆包</span>
        <span class="indicator" style="background:#6366f1"></span>
      </button>

      <button class="tab-item" data-site="kimi" title="Kimi">
        <img src="https://www.kimi.com/favicon.ico" class="favicon" alt=""
             onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
        <span class="favicon-placeholder" style="display:none;background:#1a1a1a">KM</span>
        <span class="tab-text">Kimi</span>
        <span class="indicator" style="background:#1a1a1a"></span>
      </button>

      <button class="tab-item" data-site="minimax" title="MiniMax">
        <img src="https://agent.minimaxi.com/favicon.ico" class="favicon" alt=""
             onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
        <span class="favicon-placeholder" style="display:none;background:#0ea5e9">MM</span>
        <span class="tab-text">MiniMax</span>
        <span class="indicator" style="background:#0ea5e9"></span>
      </button>
    </div>

    <div class="sidebar-footer">
      <button class="theme-btn" id="info-btn" title="关于">
        <svg xmlns="http://www.w3.org/2000/svg" height="20" viewBox="0 -960 960 960" width="20"><path d="M423.5-703.5Q400-727 400-760t23.5-56.5Q447-840 480-840t56.5 23.5Q560-793 560-760t-23.5 56.5Q513-680 480-680t-56.5-23.5ZM420-120v-480h120v480H420Z" fill="var(--text-dim)"/></svg>
      </button>
      <button class="theme-btn" id="theme-toggle" title="切换主题">
        <svg class="icon-sun" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><g stroke-linecap="round"><line x1="12" y1="2" x2="12" y2="5"/><line x1="12" y1="19" x2="12" y2="22"/><line x1="2" y1="12" x2="5" y2="12"/><line x1="19" y1="12" x2="22" y2="12"/><line x1="4.2" y1="4.2" x2="6.3" y2="6.3"/><line x1="17.7" y1="17.7" x2="19.8" y2="19.8"/><line x1="4.2" y1="19.8" x2="6.3" y2="17.7"/><line x1="17.7" y1="6.3" x2="19.8" y2="4.2"/></g></svg>
      </button>
      <span class="footer-info">Ctrl+1~5 切换</span>
    </div>
  </div>

  <div id="content">
    <div id="navbar">
      <button class="nav-btn" id="nav-back" title="后退">
        <svg xmlns="http://www.w3.org/2000/svg" height="24" viewBox="0 -960 960 960" width="24"><path d="m313-440 224 224-57 56-320-320 320-320 57 56-224 224h487v80H313Z"/></svg>
      </button>
      <button class="nav-btn" id="nav-fwd" title="前进">
        <svg xmlns="http://www.w3.org/2000/svg" height="24" viewBox="0 -960 960 960" width="24"><path d="M647-440H160v-80h487L423-744l57-56 320 320-320 320-57-56 224-224Z"/></svg>
      </button>
      <button class="nav-btn" id="nav-refresh" title="刷新">
        <svg xmlns="http://www.w3.org/2000/svg" height="24" viewBox="0 -960 960 960" width="24"><path d="M480-160q-134 0-227-93t-93-227q0-134 93-227t227-93q69 0 132 28.5T720-690v-110h80v280H520v-80h168q-32-56-87.5-88T480-720q-100 0-170 70t-70 170q0 100 70 170t170 70q77 0 139-44t87-116h84q-28 106-114 173t-196 67Z"/></svg>
      </button>
      <div id="url-bar">
        <span class="url-domain">chat.deepseek.com</span>&nbsp;&bull;&nbsp;<span class="url-path">/</span>
      </div>
      <span class="site-tag ds" id="site-tag">DeepSeek</span>
    </div>

    <div id="webview-container">
      <webview id="wv-deepseek" src="https://chat.deepseek.com/"        partition="persist:deepseek" class="visible"></webview>
      <webview id="wv-yuanbao"  src="https://yuanbao.tencent.com/chat/" partition="persist:yuanbao"></webview>
      <webview id="wv-doubao"   src="https://www.doubao.com/chat/"     partition="persist:doubao"></webview>
      <webview id="wv-kimi"     src="https://www.kimi.com/"            partition="persist:kimi"></webview>
      <webview id="wv-minimax"  src="https://agent.minimaxi.com/"      partition="persist:minimax"></webview>
    </div>
  </div>
</div>

<div id="about-overlay">
  <div id="about-dialog">
    <h2>关于 AI Chat Hub</h2>
    <div class="about-row"><span class="about-label">版本</span><span class="about-value">1.0.0</span></div>
    <div class="about-row"><span class="about-label">许可协议</span><span class="about-value">ISC</span></div>
    <div class="about-row"><span class="about-label">GitHub</span><span class="about-value"><a href="#" id="about-repo-link">github.com/Shawnylin/aichathub</a></span></div>
    <button class="about-close" id="about-close">关闭</button>
  </div>
</div>

<script>
  const sidebar = document.getElementById('sidebar');
  const collapseBtn = document.getElementById('collapse-btn');
  if (localStorage.getItem('aihub-sidebar-collapsed') === '1') sidebar.classList.add('collapsed');
  collapseBtn.addEventListener('click', () => {
    const c = sidebar.classList.toggle('collapsed');
    localStorage.setItem('aihub-sidebar-collapsed', c ? '1' : '0');
  });

  const themeToggle = document.getElementById('theme-toggle');
  const iconSun  = '<svg class="icon-sun" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><g stroke-linecap="round"><line x1="12" y1="2" x2="12" y2="5"/><line x1="12" y1="19" x2="12" y2="22"/><line x1="2" y1="12" x2="5" y2="12"/><line x1="19" y1="12" x2="22" y2="12"/><line x1="4.2" y1="4.2" x2="6.3" y2="6.3"/><line x1="17.7" y1="17.7" x2="19.8" y2="19.8"/><line x1="4.2" y1="19.8" x2="6.3" y2="17.7"/><line x1="17.7" y1="6.3" x2="19.8" y2="4.2"/></g></svg>';
  const iconMoon = '<svg class="icon-moon" viewBox="0 0 24 24"><path d="M21 13.5A9 9 0 0 1 10.5 3 7 7 0 1 0 21 13.5z"/></svg>';

  if (localStorage.getItem('aihub-theme') === 'dark') {
    document.body.classList.add('dark');
    themeToggle.innerHTML = iconMoon;
  }
  themeToggle.addEventListener('click', () => {
    const isDark = document.body.classList.toggle('dark');
    themeToggle.innerHTML = isDark ? iconMoon : iconSun;
    localStorage.setItem('aihub-theme', isDark ? 'dark' : 'light');
  });

  const aboutOverlay = document.getElementById('about-overlay');
  document.getElementById('info-btn').addEventListener('click', () => aboutOverlay.classList.add('show'));
  document.getElementById('about-close').addEventListener('click', () => aboutOverlay.classList.remove('show'));
  aboutOverlay.addEventListener('click', (e) => { if (e.target === aboutOverlay) aboutOverlay.classList.remove('show'); });
  document.getElementById('about-repo-link').addEventListener('click', (e) => {
    e.preventDefault();
    window.app.openExternal('https://github.com/Shawnylin/aichathub');
  });

  const tabItems = document.querySelectorAll('.tab-item');
  const webviews = document.querySelectorAll('webview');
  const urlBar = document.getElementById('url-bar');
  const siteTag = document.getElementById('site-tag');

  const SITES = {
    deepseek:{name:'DeepSeek',    domain:'chat.deepseek.com',     url:'https://chat.deepseek.com/',        cls:'ds'},
    yuanbao: {name:'腾讯元宝',     domain:'yuanbao.tencent.com',   url:'https://yuanbao.tencent.com/chat/', cls:'yb'},
    doubao:  {name:'豆包',        domain:'www.doubao.com',        url:'https://www.doubao.com/chat/',      cls:'db'},
    kimi:    {name:'Kimi',        domain:'www.kimi.com',          url:'https://www.kimi.com/',             cls:'km'},
    minimax: {name:'MiniMax',     domain:'agent.minimaxi.com',    url:'https://agent.minimaxi.com/',       cls:'mm'}
  };
  const SITE_ORDER = ['deepseek','yuanbao','doubao','kimi','minimax'];
  let activeSite = 'deepseek';

  function getActiveWebview() { return document.getElementById('wv-'+activeSite); }

  function switchTab(site) {
    activeSite = site;
    tabItems.forEach(b => b.classList.toggle('active', b.dataset.site === site));
    webviews.forEach(wv => wv.classList.toggle('visible', wv.id === 'wv-'+site));
    const info = SITES[site];
    siteTag.textContent = info.name;
    siteTag.className = 'site-tag ' + info.cls;
    updateUrl();
    updateNavState();
  }
  tabItems.forEach(btn => btn.addEventListener('click', () => switchTab(btn.dataset.site)));

  const navBack = document.getElementById('nav-back');
  const navFwd  = document.getElementById('nav-fwd');
  const navRef  = document.getElementById('nav-refresh');

  navBack.addEventListener('click', () => {
    const wv = getActiveWebview(); if (wv.canGoBack()) wv.goBack();
  });
  navFwd.addEventListener('click', () => {
    const wv = getActiveWebview(); if (wv.canGoForward()) wv.goForward();
  });
  navRef.addEventListener('click', () => getActiveWebview().reload());

  function updateNavState() {
    const wv = getActiveWebview();
    navBack.classList.toggle('disabled', !wv.canGoBack());
    navFwd.classList.toggle('disabled', !wv.canGoForward());
  }

  function updateUrl() {
    const wv = getActiveWebview();
    urlBar.style.opacity = '';
    try {
      const u = wv.getURL();
      if (u) {
        const p = new URL(u);
        urlBar.innerHTML = '';
        const host = document.createElement('span');
        host.className = 'url-domain';
        host.textContent = p.hostname;
        const sep = document.createTextNode(' • ');
        const path = document.createElement('span');
        path.className = 'url-path';
        path.textContent = p.pathname + p.search;
        urlBar.appendChild(host);
        urlBar.appendChild(sep);
        urlBar.appendChild(path);
        return;
      }
    } catch(e) {}
    urlBar.innerHTML = '';
    const host = document.createElement('span');
    host.className = 'url-domain';
    host.textContent = SITES[activeSite].domain;
    urlBar.appendChild(host);
  }

  webviews.forEach(wv => {
    const siteId = wv.id.replace('wv-','');

    ['did-navigate','did-navigate-in-page'].forEach(ev =>
      wv.addEventListener(ev, () => {
        if (wv.classList.contains('visible')) { updateUrl(); updateNavState(); }
      })
    );
    wv.addEventListener('did-start-loading', () => {
      if (wv.classList.contains('visible')) {
        urlBar.innerHTML = '';
        urlBar.style.opacity = '0.5';
        urlBar.textContent = '加载中...';
      }
    });
    wv.addEventListener('did-stop-loading', () => {
      if (wv.classList.contains('visible')) { updateUrl(); updateNavState(); }
    });

    // 提取页面 favicon → 更新侧栏图标
    wv.addEventListener('page-favicon-updated', (e) => {
      const favs = e.favicons;
      if (favs && favs.length > 0) {
        const tabBtn = document.querySelector(`.tab-item[data-site="${siteId}"]`);
        if (tabBtn) {
          const img = tabBtn.querySelector('.favicon');
          if (img) {
            img.src = favs[0];
            img.style.display = '';
            img.nextElementSibling.style.display = 'none';
          }
        }
      }
    });

    // 新窗口/弹出窗口 → 在当前 webview 内跳转
    wv.addEventListener('new-window', e => {
      e.preventDefault();
      wv.loadURL(e.url);
    });
    try {
      wv.setWindowOpenHandler(({ url }) => {
        wv.loadURL(url);
        return { action: 'deny' };
      });
    } catch(e) {}
  });

  document.addEventListener('keydown', e => {
    if (e.ctrlKey && e.key >= '1' && e.key <= '5') {
      e.preventDefault(); switchTab(SITE_ORDER[parseInt(e.key)-1]);
    }
    if (e.ctrlKey && e.key === 'r') { e.preventDefault(); getActiveWebview().reload(); }
    if (e.ctrlKey && e.key === 'b') { e.preventDefault(); collapseBtn.click(); }
    if (e.ctrlKey && e.key === 'd') { e.preventDefault(); themeToggle.click(); }
  });

  document.getElementById('btn-min').addEventListener('click', () => window.app.minimize());
  document.getElementById('btn-max').addEventListener('click', () => window.app.maximize());
  document.getElementById('btn-close').addEventListener('click', () => window.app.close());
  window.app.isMaximized().then(v => {
    if (v) document.getElementById('btn-max').innerHTML = '&#x2B1C;';
  });
  window.app.onMaximizeChange(v => {
    document.getElementById('btn-max').innerHTML = v ? '&#x2B1C;' : '&#x25A1;';
  });

  updateUrl();
</script>
</body>
</html>
